<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zonamerica Events</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#FAFAF8;color:#1A1D1A}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;border-bottom:1px solid #E2E3DE;background:#fff;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:#0B6E4F;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px}
.container{max-width:960px;margin:0 auto;padding:28px 32px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{padding:16px 18px;background:#fff;border:1px solid #EEEFEB;border-radius:12px}
.stat-label{font-size:12px;color:#8A8E8A;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-value{font-size:26px;font-weight:600}
.card{background:#fff;border:1px solid #EEEFEB;border-radius:12px;overflow:hidden}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #EEEFEB}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 18px;text-align:left;font-weight:500;color:#5C615C;font-size:12px;background:#F3F4F2}
td{padding:12px 18px;border-bottom:1px solid #EEEFEB}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:#E8F8EF;color:#27AE60}
.badge-orange{background:#FEF3E6;color:#D97B2B}
.badge-teal{background:#E8F5EF;color:#0B6E4F}
.badge-gray{background:#F3F4F2;color:#5C615C}
.badge-ext{background:#FEF3E6;color:#D97B2B;font-size:12px;padding:2px 8px;border-radius:6px}
.badge-int{background:#E8F5EF;color:#0B6E4F;font-size:12px;padding:2px 8px;border-radius:6px}
.btn{padding:8px 16px;border-radius:8px;border:none;background:#0B6E4F;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.btn-accent{background:#D97B2B}
.link-box{display:flex;gap:12px;padding:16px 18px;background:#E8F5EF;border-radius:12px;margin-bottom:24px;align-items:center;flex-wrap:wrap}
.form-field{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #E2E3DE;font-size:14px;outline:none}
.text-muted{color:#5C615C}
.text-light{color:#8A8E8A}
.tabs{display:flex;gap:8px}
.tab{padding:8px 20px;border-radius:8px;border:2px solid #E2E3DE;background:#fff;font-size:14px;font-weight:500;cursor:pointer;color:#5C615C}
.tab.active{border-color:#0B6E4F;background:#E8F5EF;color:#094D38}
h1{font-size:22px;font-weight:600}
h2{font-size:18px;font-weight:600}
.qr-box{padding:20px;background:#F3F4F2;border-radius:12px;display:inline-block}
.confirm-card{width:400px;max-width:100%;background:#fff;border-radius:16px;padding:36px 32px;text-align:center;border:1px solid #EEEFEB}
.success-icon{width:56px;height:56px;border-radius:50%;background:#E8F8EF;color:#27AE60;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.hidden{display:none}
.row{display:grid;gap:12px}
.row-2{grid-template-columns:1fr 1fr}
.row-2-1{grid-template-columns:2fr 1fr}
.mb-16{margin-bottom:16px}.mb-18{margin-bottom:18px}.mb-24{margin-bottom:24px}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.center{text-align:center}
.full-page{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1D1A;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:560px}
@media(max-width:760px){
  .nav{height:auto;padding:10px 16px;justify-content:center}
  .nav .tabs{order:3;width:100%;justify-content:center}
  .container{padding:20px 16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-stats{grid-template-columns:1fr}
  .row-2,.row-2-1{grid-template-columns:1fr}
  .tab{padding:8px 14px;font-size:13px}
  h1{font-size:20px}
  .link-box{flex-direction:column;align-items:stretch}
  .link-box .btn{width:100%}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
var EVENTS=[
{id:1,name:"Forbes Uruguay \u2014 Future of Work 2026",date:"2026-06-25",time:"09:00",location:"Auditorio Principal",capacity:120,organizer:"Forbes Uruguay",orgType:"ext",status:"active",guests:[
{name:"Mar\u00eda Garc\u00eda",ci:"4.567.890-1",email:"maria@gmail.com",company:"Globant",status:"confirmed"},
{name:"Juan Rodr\u00edguez",ci:"3.456.789-2",email:"juan@mercadolibre.com",company:"MercadoLibre",status:"confirmed"},
{name:"Ana Mart\u00ednez",ci:"5.678.901-3",email:"ana@dlocal.com",company:"dLocal",status:"pending"},
{name:"Carlos L\u00f3pez",ci:"2.345.678-4",email:"carlos@pedidosya.com",company:"PedidosYa",status:"confirmed"},
{name:"Luc\u00eda Fern\u00e1ndez",ci:"6.789.012-5",email:"lucia@tryolabs.com",company:"Tryolabs",status:"pending"}]},
{id:2,name:"Tech Meetup \u2014 AI & Data",date:"2026-07-03",time:"18:30",location:"Sala de Eventos B",capacity:60,organizer:"Zonamerica",orgType:"int",status:"active",guests:[
{name:"Pedro \u00c1lvarez",ci:"1.234.567-6",email:"pedro@gmail.com",company:"Freelance",status:"confirmed"},
{name:"Sof\u00eda D\u00edaz",ci:"7.890.123-7",email:"sofia@ey.com",company:"EY",status:"confirmed"}]},
{id:3,name:"Workshop Design Thinking",date:"2026-07-10",time:"14:00",location:"Cowork Space",capacity:25,organizer:"Zonamerica",orgType:"int",status:"draft",guests:[]}];
var nextId=4, view="dashboard", selId=null, formOrgType="int";

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2200);}
function badge(s){var m={confirmed:"badge-green",pending:"badge-orange",active:"badge-teal",draft:"badge-gray"},l={confirmed:"Confirmado",pending:"Pendiente",active:"Activo",draft:"Borrador"};return "<span class='badge "+(m[s]||"badge-gray")+"'>"+(l[s]||s)+"</span>";}
function orgBadge(e){return "<span class='"+(e.orgType==="ext"?"badge-ext":"badge-int")+"'>"+e.organizer+"</span>";}
function makeQR(size){var svg="<svg width='"+size+"' height='"+size+"' viewBox='0 0 "+size+" "+size+"'><rect width='"+size+"' height='"+size+"' fill='white'/>",g=15,cs=size/g,seed=42;for(var r=0;r<g;r++)for(var c=0;c<g;c++){var fp=(r<4&&c<4)||(r<4&&c>g-5)||(r>g-5&&c<4),fb=(r<5&&c<5)||(r<5&&c>g-6)||(r>g-6&&c<5),fill=false;if(fp)fill=true;else if(fb)fill=r===0||r===4||r===g-5||c===0||c===4||c===g-5;else{seed=(seed*1103515245+12345)&0x7fffffff;fill=seed%3!==0;}if(fill)svg+="<rect x='"+(c*cs)+"' y='"+(r*cs)+"' width='"+cs+"' height='"+cs+"' fill='#1A1D1A'/>";}return svg+"</svg>";}
function fmtDate(d){return new Date(d+"T00:00").toLocaleDateString("es-UY",{day:"numeric",month:"short"});}
function fmtDateLong(d){return new Date(d+"T00:00").toLocaleDateString("es-UY",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function evById(id){for(var i=0;i<EVENTS.length;i++)if(EVENTS[i].id===id)return EVENTS[i];return null;}
function nav(v){view=v;selId=null;location.hash="";render();}
function sel(id){selId=id;location.hash="";render();}
function setOrgType(t){formOrgType=t;render();}
function openReg(id){location.hash="registro/"+id;}
function backToPanel(){location.hash="";view="dashboard";selId=null;render();}
function copyLink(link){if(navigator.clipboard){navigator.clipboard.writeText(link).then(function(){toast("Link copiado");});}else{toast(link);}}

function render(){
  var app=document.getElementById("app"),hash=location.hash;
  if(hash.indexOf("#registro/")===0){
    var ev=evById(parseInt(hash.split("/")[1]));
    if(ev){app.innerHTML=renderGuest(ev);attachGuest(ev);return;}
  }
  var h="<div class='nav'><div class='logo'><div class='logo-icon'>ZA</div><span style='font-weight:600;font-size:15px'>Zonamerica Events</span></div>";
  h+="<div class='tabs'><button class='tab "+(view==="dashboard"?"active":"")+"' onclick='nav(\u0022dashboard\u0022)'>Eventos</button><button class='tab "+(view==="create"?"active":"")+"' onclick='nav(\u0022create\u0022)'>Nuevo evento</button></div>";
  h+="<div style='display:flex;align-items:center;gap:10px'><span class='text-muted' style='font-size:13px'>Zonamerica</span><div style='width:30px;height:30px;border-radius:50%;background:#E8F5EF;color:#0B6E4F;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600'>Z</div></div></div>";
  if(view==="dashboard"&&!selId)h+=renderDashboard();
  else if(view==="dashboard"&&selId)h+=renderDetail();
  else if(view==="create")h+=renderCreate();
  app.innerHTML=h;
}
function renderDashboard(){
  var total=EVENTS.length,active=EVENTS.filter(function(e){return e.status==="active"}).length,guests=EVENTS.reduce(function(s,e){return s+e.guests.length},0),conf=EVENTS.reduce(function(s,e){return s+e.guests.filter(function(g){return g.status==="confirmed"}).length},0);
  var h="<div class='container'><div class='mb-24'><h1>Eventos</h1><p class='text-muted' style='font-size:14px;margin-top:4px'>Gesti\u00f3n de eventos y acreditaciones para Zonamerica</p></div>";
  h+="<div class='stats'><div class='stat'><div class='stat-label'>Eventos</div><div class='stat-value'>"+total+"</div></div><div class='stat'><div class='stat-label'>Activos</div><div class='stat-value'>"+active+"</div></div><div class='stat'><div class='stat-label'>Invitados</div><div class='stat-value'>"+guests+"</div></div><div class='stat'><div class='stat-label'>Confirmados</div><div class='stat-value'>"+conf+"</div></div></div>";
  h+="<div class='card'><div class='card-header'><span style='font-size:14px;font-weight:600'>Todos los eventos</span><button class='btn' onclick='nav(\u0022create\u0022)'>+ Nuevo evento</button></div>";
  h+="<div class='table-wrap'><table><thead><tr><th>Evento</th><th>Fecha</th><th>Organizador</th><th>Invitados</th><th>Estado</th></tr></thead><tbody>";
  EVENTS.forEach(function(e){h+="<tr style='cursor:pointer' onclick='sel("+e.id+")'><td><div style='font-weight:500'>"+e.name+"</div><div class='text-light' style='font-size:12px;margin-top:2px'>"+e.location+"</div></td><td class='text-muted'>"+fmtDate(e.date)+" \u00b7 "+e.time+"</td><td>"+orgBadge(e)+"</td><td class='text-muted'>"+e.guests.filter(function(g){return g.status==="confirmed"}).length+"/"+e.guests.length+"</td><td>"+badge(e.status)+"</td></tr>";});
  h+="</tbody></table></div></div></div>";return h;
}
function renderDetail(){
  var e=evById(selId);if(!e)return "";
  var conf=e.guests.filter(function(g){return g.status==="confirmed"}).length,pend=e.guests.filter(function(g){return g.status==="pending"}).length;
  var regLink=location.origin+location.pathname+"#registro/"+e.id;
  var h="<div class='container'><button onclick='nav(\u0022dashboard\u0022)' style='padding:0;border:none;background:none;color:#5C615C;font-size:13px;cursor:pointer;margin-bottom:16px'>&#8592; Volver a eventos</button>";
  h+="<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:10px'><div><div style='display:flex;align-items:center;gap:10px;margin-bottom:4px'><h2>"+e.name+"</h2>"+badge(e.status)+"</div><p class='text-muted' style='font-size:13px'>"+fmtDateLong(e.date)+" \u00b7 "+e.time+" \u00b7 "+e.location+"</p></div>"+orgBadge(e)+"</div>";
  h+="<div class='link-box'><div style='flex:1;min-width:200px'><div style='font-size:12px;font-weight:500;color:#094D38;margin-bottom:4px'>Link de registro para invitados</div><div style='font-size:13px;color:#0B6E4F;font-family:monospace;word-break:break-all'>"+regLink+"</div></div><button class='btn' onclick=\"copyLink('"+regLink+"')\">Copiar link</button><button class='btn btn-accent' onclick='openReg("+e.id+")'>Abrir registro &#8594;</button></div>";
  h+="<div class='detail-stats'><div class='stat'><div class='stat-label'>Capacidad</div><div class='stat-value' style='font-size:22px'>"+e.guests.length+" / "+e.capacity+"</div></div><div class='stat'><div class='stat-label'>Confirmados</div><div class='stat-value' style='font-size:22px'>"+conf+"</div></div><div class='stat'><div class='stat-label'>Pendientes</div><div class='stat-value' style='font-size:22px'>"+pend+"</div></div></div>";
  h+="<div class='card'><div class='card-header'><span style='font-weight:600'>Invitados registrados</span></div>";
  if(e.guests.length===0){h+="<div style='padding:40px;text-align:center' class='text-muted'>A\u00fan no hay invitados registrados. Compart\u00ed el link de arriba.</div>";}
  else{h+="<div class='table-wrap'><table><thead><tr><th>Nombre</th><th>C\u00e9dula</th><th>Empresa</th><th>Email</th><th>Estado</th></tr></thead><tbody>";e.guests.forEach(function(g){h+="<tr><td style='font-weight:500'>"+g.name+"</td><td class='text-muted' style='font-family:monospace;font-size:12px'>"+g.ci+"</td><td class='text-muted'>"+g.company+"</td><td class='text-muted'>"+g.email+"</td><td>"+badge(g.status)+"</td></tr>";});h+="</tbody></table></div>";}
  h+="</div></div>";return h;
}
function renderCreate(){
  var h="<div class='container' style='max-width:580px'><button onclick='nav(\u0022dashboard\u0022)' style='padding:0;border:none;background:none;color:#5C615C;font-size:13px;cursor:pointer;margin-bottom:16px'>&#8592; Volver</button>";
  h+="<h1 style='margin-bottom:4px'>Crear evento</h1><p class='text-muted' style='font-size:13px;margin-bottom:24px'>Configur\u00e1 los datos del evento. Los invitados se registrar\u00e1n v\u00eda el link p\u00fablico.</p>";
  h+="<div class='card' style='padding:24px'><div class='mb-18'><label>Nombre del evento</label><input class='form-field' id='f-name' placeholder='Ej: Forbes Uruguay \u2014 Future of Work'></div>";
  h+="<div class='row row-2 mb-18'><div><label>Fecha</label><input class='form-field' id='f-date' type='date'></div><div><label>Hora</label><input class='form-field' id='f-time' type='time'></div></div>";
  h+="<div class='row row-2-1 mb-18'><div><label>Ubicaci\u00f3n</label><input class='form-field' id='f-loc' placeholder='Auditorio Principal'></div><div><label>Capacidad</label><input class='form-field' id='f-cap' type='number' placeholder='120'></div></div>";
  h+="<div class='mb-18'><label>Tipo de organizador</label><div style='display:flex;gap:8px'><button type='button' class='tab "+(formOrgType==="int"?"active":"")+"' style='flex:1' onclick='setOrgType(\u0022int\u0022)'>Interno (Zonamerica)</button><button type='button' class='tab "+(formOrgType==="ext"?"active":"")+"' style='flex:1' onclick='setOrgType(\u0022ext\u0022)'>Externo (otra empresa)</button></div></div>";
  if(formOrgType==="ext"){h+="<div class='mb-18'><label>Nombre de la empresa organizadora</label><input class='form-field' id='f-org' placeholder='Ej: Forbes Uruguay'></div>";}
  h+="<button class='btn' style='width:100%;padding:12px 0;font-size:14px;font-weight:600;border-radius:10px' onclick='createEvent()'>Crear evento</button></div></div>";
  return h;
}
function createEvent(){
  var name=document.getElementById("f-name").value.trim(),date=document.getElementById("f-date").value,time=document.getElementById("f-time").value,loc=document.getElementById("f-loc").value.trim(),cap=parseInt(document.getElementById("f-cap").value)||50;
  if(!name){toast("Pon\u00e9 un nombre al evento");return;}
  if(!date){toast("Eleg\u00ed una fecha");return;}
  var org="Zonamerica";
  if(formOrgType==="ext"){var oe=document.getElementById("f-org");org=oe&&oe.value.trim()?oe.value.trim():"Empresa externa";}
  var ev={id:nextId++,name:name,date:date,time:time||"09:00",location:loc||"A definir",capacity:cap,organizer:org,orgType:formOrgType,status:"active",guests:[]};
  EVENTS.unshift(ev);formOrgType="int";selId=ev.id;view="dashboard";render();toast("Evento creado. Compart\u00ed el link de registro.");
}
function renderGuest(e){
  var h="<div class='full-page'><div style='width:440px;max-width:100%'><div class='center mb-24'><div class='logo-icon' style='width:40px;height:40px;font-size:16px;border-radius:10px;margin:0 auto 12px;display:flex'>ZA</div><h2>"+e.name+"</h2><p class='text-muted' style='font-size:13px;margin-top:4px'>"+fmtDateLong(e.date)+" \u00b7 "+e.time+"</p><p class='text-light' style='font-size:13px;margin-top:2px'>"+e.location+" \u2014 Zonamerica</p></div>";
  h+="<div class='card' style='padding:28px' id='reg-form'><h2 style='font-size:15px;margin-bottom:4px'>Registro de visitante</h2><p class='text-muted' style='font-size:12px;margin-bottom:20px'>Complet\u00e1 tus datos para acreditarte en el campus de Zonamerica.</p>";
  h+="<div class='mb-16'><label>Nombre completo</label><input class='form-field' id='g-name' placeholder='Mar\u00eda Garc\u00eda'></div>";
  h+="<div class='row row-2 mb-16'><div><label>C\u00e9dula de identidad</label><input class='form-field' id='g-ci' placeholder='1.234.567-8'></div><div><label>Celular</label><input class='form-field' id='g-phone' placeholder='099 123 456'></div></div>";
  h+="<div class='mb-16'><label>Email</label><input class='form-field' id='g-email' type='email' placeholder='maria@ejemplo.com'></div>";
  h+="<div class='mb-24'><label>Empresa</label><input class='form-field' id='g-company' placeholder='Globant'></div>";
  h+="<button class='btn' id='btn-register' style='width:100%;padding:12px 0;font-size:14px;font-weight:600;border-radius:10px'>Registrarme</button>";
  h+="<p class='text-light center' style='font-size:11px;margin-top:14px'>Tus datos ser\u00e1n registrados como visitante en Zonamerica \u00fanicamente para este evento.</p></div>";
  h+="<div id='reg-confirm' class='hidden'><div class='confirm-card'><div class='success-icon'>&#10003;</div><h2 style='font-size:20px;margin-bottom:6px'>Registro confirmado</h2><p class='text-muted' style='font-size:13px;margin-bottom:24px'>Tu acreditaci\u00f3n para ingresar a Zonamerica fue generada. Present\u00e1 este QR en la entrada el d\u00eda del evento.</p><div class='qr-box' style='margin-bottom:20px'>"+makeQR(140)+"</div><div style='font-size:13px;font-weight:500' id='conf-name'></div><div class='text-muted' style='font-size:12px'>"+e.name+"</div><div class='text-light' style='font-size:12px'>"+e.location+"</div><p class='text-light' style='font-size:12px;margin-top:16px'>Tambi\u00e9n recibir\u00e1s un email con tu acreditaci\u00f3n.</p></div></div>";
  h+="<div class='center' style='margin-top:16px'><button onclick='backToPanel()' style='padding:6px 16px;border-radius:8px;border:1px solid #E2E3DE;background:none;color:#5C615C;font-size:12px;cursor:pointer'>&#8592; Volver al panel (demo)</button></div></div></div>";
  return h;
}
function attachGuest(ev){
  setTimeout(function(){
    var btn=document.getElementById("btn-register");
    if(btn)btn.onclick=function(){
      var name=document.getElementById("g-name").value.trim(),ci=document.getElementById("g-ci").value.trim(),email=document.getElementById("g-email").value.trim(),company=document.getElementById("g-company").value.trim();
      if(!name){toast("Ingres\u00e1 tu nombre");return;}
      if(!ci){toast("Ingres\u00e1 tu c\u00e9dula");return;}
      ev.guests.push({name:name,ci:ci,email:email||"-",company:company||"-",status:"pending"});
      document.getElementById("reg-form").classList.add("hidden");
      document.getElementById("reg-confirm").classList.remove("hidden");
      document.getElementById("conf-name").textContent=name;
    };
  },50);
}
window.addEventListener("hashchange",render);
render();
</script>
</body>
</html>
